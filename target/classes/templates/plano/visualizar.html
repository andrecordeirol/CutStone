<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::content})}">
<body><th:block th:fragment="content">
<div class="page-header">
    <div>
        <h1><i class="fas fa-drafting-compass"></i> Plano de Corte #<span th:text="${plano.id}"></span></h1>
        <nav class="breadcrumb">
            <a th:href="@{/pedidos}">Pedidos</a> /
            <a th:href="@{'/pedidos/'+${plano.pedido.id}}">Pedido #<span th:text="${plano.pedido.id}"></span></a> /
            Plano #<span th:text="${plano.id}"></span>
        </nav>
    </div>
    <div class="header-actions">
        <button onclick="window.print()" class="btn btn-outline"><i class="fas fa-print"></i> Imprimir</button>
        <a th:href="@{'/pedidos/'+${plano.pedido.id}}" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Voltar</a>
    </div>
</div>

<div class="cards-grid-4">
    <div class="stat-card">
        <span class="stat-label">Chapa</span>
        <span class="stat-value" th:text="${plano.chapa.material}+' '+${plano.chapa.cor}"></span>
    </div>
    <div class="stat-card">
        <span class="stat-label">Dimensões</span>
        <span class="stat-value" th:text="${plano.chapa.largura}+' × '+${plano.chapa.altura}+' cm'"></span>
    </div>
    <div class="stat-card stat-green">
        <span class="stat-label">Aproveitamento</span>
        <span class="stat-value" th:text="${plano.aproveitamento}+'%'"></span>
    </div>
    <div class="stat-card">
        <span class="stat-label">Peças Encaixadas</span>
        <span class="stat-value" th:text="${plano.totalPecasEncaixadas}+' / '+(${plano.totalPecasEncaixadas}+${plano.totalPecasNaoEncaixadas})"></span>
    </div>
</div>

<div class="section-card canvas-section">
    <div class="section-header">
        <h2><i class="fas fa-vector-square"></i> Visualização do Corte</h2>
        <div class="canvas-controls">
            <button onclick="zoomIn()" class="btn btn-sm btn-outline"><i class="fas fa-search-plus"></i></button>
            <button onclick="zoomOut()" class="btn btn-sm btn-outline"><i class="fas fa-search-minus"></i></button>
            <button onclick="resetZoom()" class="btn btn-sm btn-outline"><i class="fas fa-expand"></i> Ajustar</button>
        </div>
    </div>
    <div class="canvas-wrapper">
        <canvas id="planoCanvas"></canvas>
    </div>
    <p class="canvas-hint"><i class="fas fa-info-circle"></i> Passe o mouse sobre as peças para ver os detalhes.</p>
</div>

<div class="section-card">
    <h2><i class="fas fa-list"></i> Lista de Peças</h2>
    <div th:if="${#lists.isEmpty(plano.pecasPositionadas)}" class="empty-state">
        <i class="fas fa-exclamation-triangle"></i><p>Nenhuma peça encaixada.</p>
    </div>
    <table th:unless="${#lists.isEmpty(plano.pecasPositionadas)}" class="table">
        <thead><tr><th>Nº</th><th>Descrição</th><th>Pos X</th><th>Pos Y</th><th>Largura</th><th>Altura</th><th>Área</th><th>Rotacionada</th></tr></thead>
        <tbody>
        <tr th:each="p : ${plano.pecasPositionadas}">
            <td><span class="peca-num" th:text="${p.numeroPeca}"></span></td>
            <td th:text="${p.descricao}"></td>
            <td th:text="${p.x}+' cm'"></td>
            <td th:text="${p.y}+' cm'"></td>
            <td th:text="${p.largura}+' cm'"></td>
            <td th:text="${p.altura}+' cm'"></td>
            <td th:text="${#numbers.formatDecimal(p.largura*p.altura/10000,1,3)}+' m²'"></td>
            <td th:text="${p.rotacionada ? 'Sim (90°)' : 'Não'}"></td>
        </tr>
        </tbody>
    </table>
</div>

<script th:inline="javascript">
const PECAS = /*[[${pecasJson}]]*/ [];
const CHAPA_W = /*[[${chapaLargura}]]*/ 280;
const CHAPA_H = /*[[${chapaAltura}]]*/ 160;
</script>
<script>
const canvas = document.getElementById('planoCanvas');
const ctx = canvas.getContext('2d');
const CORES = ['#4A90D9','#E8734A','#5CB85C','#9B59B6','#F39C12','#1ABC9C','#E74C3C','#3498DB','#2ECC71','#F1C40F','#E67E22','#16A085','#8E44AD'];
let escala = 1, ox = 40, oy = 40, hovered = null;

function fit() {
    const mw = canvas.parentElement.clientWidth - 80, mh = 560;
    return Math.min(mw / CHAPA_W, mh / CHAPA_H, 3);
}

function shade(c, p) {
    return '#' + [1,3,5].map(i => Math.min(255,Math.max(0,parseInt(c.slice(i,i+2),16)+p)).toString(16).padStart(2,'0')).join('');
}

function draw() {
    const cw = CHAPA_W * escala + ox*2, ch = CHAPA_H * escala + oy*2;
    canvas.width = cw; canvas.height = ch;
    ctx.fillStyle = '#f0ede8'; ctx.fillRect(0,0,cw,ch);

    // Chapa
    ctx.fillStyle = '#e0d8cc'; ctx.fillRect(ox,oy,CHAPA_W*escala,CHAPA_H*escala);
    ctx.strokeStyle='#888'; ctx.lineWidth=2; ctx.strokeRect(ox,oy,CHAPA_W*escala,CHAPA_H*escala);

    // Grid
    ctx.strokeStyle='rgba(0,0,0,0.05)'; ctx.lineWidth=0.5;
    const gs = 50*escala;
    for(let x=ox;x<=ox+CHAPA_W*escala;x+=gs){ctx.beginPath();ctx.moveTo(x,oy);ctx.lineTo(x,oy+CHAPA_H*escala);ctx.stroke();}
    for(let y=oy;y<=oy+CHAPA_H*escala;y+=gs){ctx.beginPath();ctx.moveTo(ox,y);ctx.lineTo(ox+CHAPA_W*escala,y);ctx.stroke();}

    // Dimensões
    ctx.fillStyle='#555'; ctx.font=`${Math.max(10,12*escala)}px sans-serif`;
    ctx.fillText(CHAPA_W+' cm', ox+CHAPA_W*escala/2-25, oy-10);
    ctx.save(); ctx.translate(ox-18,oy+CHAPA_H*escala/2); ctx.rotate(-Math.PI/2);
    ctx.fillText(CHAPA_H+' cm',-20,0); ctx.restore();

    // Peças
    PECAS.forEach((p,i) => {
        const px=ox+p.x*escala+1, py=oy+p.y*escala+1, pw=p.largura*escala-2, ph=p.altura*escala-2;
        const cor = CORES[i%CORES.length], isH = hovered && hovered.numero===p.numero;
        if(isH){ctx.shadowColor='rgba(0,0,0,.3)';ctx.shadowBlur=10;}
        ctx.globalAlpha = isH ? 1 : 0.85;
        ctx.fillStyle = isH ? shade(cor,-20) : cor;
        ctx.fillRect(px,py,pw,ph);
        ctx.globalAlpha=1; ctx.shadowBlur=0;
        ctx.strokeStyle=shade(cor,-40); ctx.lineWidth=isH?2.5:1.5;
        ctx.strokeRect(px,py,pw,ph);
        const fs=Math.max(8,Math.min(13,pw/4,ph/3));
        ctx.fillStyle='#fff'; ctx.font=`bold ${fs}px sans-serif`;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        if(pw>18&&ph>12) ctx.fillText(p.numero,px+pw/2,py+ph/2-(pw>35&&ph>25?fs/2:0));
        if(pw>35&&ph>25){ctx.font=`${Math.max(7,fs-2)}px sans-serif`; ctx.fillText(p.largura+'×'+p.altura,px+pw/2,py+ph/2+fs/2+1);}
        ctx.textAlign='left'; ctx.textBaseline='alphabetic';
    });
}

const tip = document.createElement('div'); tip.className='canvas-tooltip'; document.body.appendChild(tip);

canvas.addEventListener('mousemove', e => {
    const r = canvas.getBoundingClientRect(), mx=e.clientX-r.left, my=e.clientY-r.top;
    hovered = PECAS.find(p => mx>=ox+p.x*escala && mx<=ox+(p.x+p.largura)*escala && my>=oy+p.y*escala && my<=oy+(p.y+p.altura)*escala) || null;
    if(hovered){
        canvas.style.cursor='pointer'; tip.style.display='block';
        tip.style.left=(e.pageX+14)+'px'; tip.style.top=(e.pageY-30)+'px';
        tip.innerHTML=`<strong>#${hovered.numero} ${hovered.descricao}</strong><br>${hovered.largura}×${hovered.altura} cm<br>Área: ${((hovered.largura*hovered.altura)/10000).toFixed(3)} m²${hovered.rotacionada?'<br><em>🔄 Rotacionada</em>':''}`;
    } else { canvas.style.cursor='default'; tip.style.display='none'; }
    draw();
});
canvas.addEventListener('mouseleave', () => { hovered=null; tip.style.display='none'; draw(); });

function zoomIn(){escala=Math.min(escala*1.2,8);draw();}
function zoomOut(){escala=Math.max(escala*0.8,0.2);draw();}
function resetZoom(){escala=fit();draw();}
window.addEventListener('load',resetZoom);
window.addEventListener('resize',resetZoom);
</script>
</th:block></body></html>
