<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::content})}">
<body><th:block th:fragment="content">
<div class="page-header">
    <div><h1><i class="fas fa-users"></i> Clientes</h1></div>
    <a th:href="@{/clientes/novo}" class="btn btn-primary"><i class="fas fa-plus"></i> Novo Cliente</a>
</div>
<div class="search-bar">
    <form method="get" th:action="@{/clientes}">
        <div class="input-group">
            <i class="fas fa-search"></i>
            <input type="text" name="busca" placeholder="Buscar por nome..." th:value="${busca}" class="form-input"/>
            <button type="submit" class="btn btn-primary">Buscar</button>
            <a th:if="${busca}" th:href="@{/clientes}" class="btn btn-outline">Limpar</a>
        </div>
    </form>
</div>
<div class="section-card">
    <div th:if="${#lists.isEmpty(clientes)}" class="empty-state">
        <i class="fas fa-users"></i><p>Nenhum cliente encontrado.</p>
        <a th:href="@{/clientes/novo}" class="btn btn-primary">Cadastrar Primeiro</a>
    </div>
    <table th:unless="${#lists.isEmpty(clientes)}" class="table">
        <thead><tr><th>#</th><th>Nome</th><th>Telefone</th><th>E-mail</th><th>Ações</th></tr></thead>
        <tbody>
        <tr th:each="c : ${clientes}">
            <td th:text="${c.id}"></td>
            <td class="font-bold"><a th:href="@{'/clientes/'+${c.id}}" th:text="${c.nome}" class="link"></a></td>
            <td th:text="${c.telefone ?: '—'}"></td>
            <td th:text="${c.email ?: '—'}"></td>
            <td class="actions-cell">
                <a th:href="@{'/clientes/'+${c.id}+'/editar'}" class="btn btn-sm btn-warning"><i class="fas fa-edit"></i></a>
                <form th:action="@{'/clientes/'+${c.id}+'/deletar'}" method="post" onsubmit="return confirm('Remover cliente?')">
                    <button type="submit" class="btn btn-sm btn-danger"><i class="fas fa-trash"></i></button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</th:block></body></html>
