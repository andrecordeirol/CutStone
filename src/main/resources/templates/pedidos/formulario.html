<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::content})}">
<body><th:block th:fragment="content">
<div class="page-header">
    <div><h1><i class="fas fa-clipboard-list"></i> <span th:text="${titulo}">Pedido</span></h1></div>
</div>
<div class="form-card">
    <form th:action="@{/pedidos/salvar}" method="post" th:object="${pedido}">
        <input type="hidden" th:field="*{id}"/>
        <div class="form-grid">
            <div class="form-group full-width">
                <label>Cliente *</label>
                <select name="cliente.id" class="form-control">
                    <option value="">— Selecione o cliente —</option>
                    <option th:each="c : ${clientes}" th:value="${c.id}" th:text="${c.nome}"
                            th:selected="${pedido.cliente != null and pedido.cliente.id == c.id}"></option>
                </select>
            </div>
            <div class="form-group">
                <label>Data do Pedido</label>
                <input type="date" th:field="*{dataPedido}" class="form-control"/>
            </div>
            <div class="form-group">
                <label>Prazo de Entrega</label>
                <input type="date" th:field="*{prazoEntrega}" class="form-control"/>
            </div>
            <div class="form-group">
                <label>Status</label>
                <select th:field="*{status}" class="form-control">
                    <option th:each="s : ${T(com.marmoraria.entity.StatusPedido).values()}"
                            th:value="${s}" th:text="${s.descricao}"></option>
                </select>
            </div>
            <div class="form-group full-width">
                <label>Observações</label>
                <textarea th:field="*{observacoes}" class="form-control" rows="3"></textarea>
            </div>
        </div>
        <div class="form-actions">
            <a th:href="@{/pedidos}" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Cancelar</a>
            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Salvar Pedido</button>
        </div>
    </form>
</div>
</th:block></body></html>
